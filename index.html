<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rise of Republic · Ударный взвод CT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="shell header">
    <a class="brand" href="javascript:void(0)" onclick="switchView('home')">
      <span class="brand-mark">CT</span>
      <span>Ударный взвод</span>
    </a>
    <nav class="nav" id="mainNav">
      <!-- Навигация будет генерироваться динамически в app.js -->
    </nav>
    <div id="headerAuth">
      <button class="btn ghost" id="profileBtn" type="button" hidden>Профиль</button>
      <button class="btn ghost" id="logoutBtn" type="button" hidden>Выйти</button>
    </div>
  </header>

  <main id="appContent">
    <!-- Сюда будет рендериться активный экран (view) -->
  </main>

  <dialog class="steam-modal" id="steamModal">
    <div class="modal-card">
      <button class="close" id="closeModal" aria-label="Закрыть">×</button>
      <div class="modal-tabs">
        <button class="tab-btn active" data-tab="login">Вход</button>
        <button class="tab-btn" data-tab="register">Регистрация</button>
      </div>
      
      <div class="tab-content active" id="loginTab">
        <form id="loginForm">
          <p class="eyebrow">Steam Auth</p>
          <h2>Вход по Steam ID</h2>
          <label>Steam ID<input name="steamId" placeholder="76561198000000000" required></label>
          <label>Пароль<input type="password" name="password" placeholder="••••••••" required></label>
          <button class="btn primary" type="submit">Войти</button>
        </form>
      </div>

      <div class="tab-content" id="registerTab">
        <form id="steamForm">
          <p class="eyebrow">Steam Login</p>
          <h2>Регистрация профиля</h2>
          <label>Steam ID<input name="steamId" placeholder="76561198000000000" required></label>
          <label>Ник Steam<input name="nickname" placeholder="Griffon / Black / Masalini" required></label>
          <label>Discord / позывной<input name="callsign" placeholder="CT | R - SP | Позывной" required></label>
          <label>Пароль<input type="password" name="password" placeholder="••••••••" required></label>
          <button class="btn primary" type="submit">Создать профиль</button>
        </form>
      </div>
    </div>
  </dialog>

  <dialog class="steam-modal" id="profileEditModal">
    <div class="modal-card">
      <button class="close" id="closeProfileModal" aria-label="Закрыть">×</button>
      <p class="eyebrow">Профиль</p>
      <h2>Редактирование профиля</h2>
      <form id="profileEditForm" style="display:grid; gap:16px;">
        <label>Ник Steam
          <input name="nickname" placeholder="Griffon / Black / Masalini" required>
        </label>
        <label>Discord / позывной
          <input name="callsign" placeholder="CT | R - SP | Позывной" required>
        </label>
        <label>Новый пароль (оставить пустым, чтобы не менять)
          <input type="password" name="password" placeholder="••••••••">
        </label>
        <button class="btn primary" type="submit">Сохранить изменения</button>
      </form>
    </div>
  </dialog>

  <footer class="shell footer">
    <p>CT Legion · Rise of Republic · v1.1.5 SPA</p>
    <button class="link-button" id="resetDemo" type="button">Сбросить данные</button>
  </footer>

  <script src="app.js"></script>
</body>
</html>
